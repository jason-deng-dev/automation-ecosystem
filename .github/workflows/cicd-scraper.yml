name: CICD — scraper

on:
  workflow_dispatch:
  push:
    paths:
      - 'services/scraper/**'
  pull_request:
    paths:
      - 'services/scraper/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: services/scraper
      - run: npm test
        working-directory: services/scraper

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: services/scraper
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/scraper:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/scraper:cache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/scraper:cache,mode=max
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/scraper:latest
            docker stop scraper || true
            docker rm scraper || true
            docker run -d \
              --name scraper \
              --env-file ~/scraper/.env \
              --restart unless-stopped \
              --network host \
              ${{ secrets.DOCKERHUB_USERNAME }}/scraper:latest
