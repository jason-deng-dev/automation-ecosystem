name: CICD — analytics

on:
  workflow_dispatch:
  push:
    paths:
      - 'services/analytics/**'

jobs:
  deploy:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: services/analytics
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/analytics:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/analytics:cache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/analytics:cache,mode=max
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/analytics:latest
            docker stop analytics || true
            docker rm analytics || true
            docker run -d \
              --name analytics \
              --env-file ~/analytics/.env \
              --restart unless-stopped \
              --network host \
              ${{ secrets.DOCKERHUB_USERNAME }}/analytics:latest
