name: CI — scraper

on:
  push:
    paths:
      - 'services/scraper/**'
  pull_request:
    paths:
      - 'services/scraper/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: services/scraper
      - run: npm test
        working-directory: services/scraper
