name: CICD — xhs

on:
  workflow_dispatch:
  push:
    paths:
      - 'services/xhs/**'
  pull_request:
    paths:
      - 'services/xhs/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: services/xhs
      - run: npm test
        working-directory: services/xhs

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: services/xhs
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/xhs:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/xhs:cache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/xhs:cache,mode=max
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/xhs:latest
            docker stop xhs || true
            docker rm xhs || true
            docker run -d \
              --name xhs \
              --env-file ~/xhs/.env \
              --mount type=bind,source=/home/ubuntu/xhs/auth.json,target=/app/auth.json \
              --restart unless-stopped \
              --network host \
              ${{ secrets.DOCKERHUB_USERNAME }}/xhs:latest
