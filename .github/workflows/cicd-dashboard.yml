name: CICD — dashboard

on:
  workflow_dispatch:
  push:
    paths:
      - 'services/dashboard/**'
  pull_request:
    paths:
      - 'services/dashboard/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: services/dashboard
      - run: npm run build
        working-directory: services/dashboard

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: services/dashboard
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/dashboard:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/dashboard:cache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/dashboard:cache,mode=max
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/dashboard:latest
            docker stop dashboard || true
            docker rm dashboard || true
            docker run -d \
              --name dashboard \
              --env-file ~/dashboard/.env \
              --restart unless-stopped \
              --network host \
              -v /var/run/docker.sock:/var/run/docker.sock \
              ${{ secrets.DOCKERHUB_USERNAME }}/dashboard:latest
